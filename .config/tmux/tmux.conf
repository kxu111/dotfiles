set -a terminal-features "tmux-256color:RGB"
set -g prefix C-b
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default fg=default"
set -g status-left ""
set -g status-right " [ #S ] "
set -g window-status-separator " "
set -g window-status-style "fg=colour8 bg=default"
set -g window-status-current-style "fg=colour5 bg=default bold"
set -g window-status-format " #I:#W#{?window_flags,#{window_flags},} "
set -g window-status-current-format " #I:#W#{?window_flags,#{window_flags},} "

bind f run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh"
bind H run "~/.config/scripts/tmux-session-dispensary.sh ~"
bind D run "~/.config/scripts/tmux-session-dispensary.sh ~/dotfiles"
bind C run "~/.config/scripts/tmux-session-dispensary.sh ~/.config"
bind N run "~/.config/scripts/tmux-session-dispensary.sh ~/nix"
bind P run "~/.config/scripts/tmux-session-dispensary.sh ~/projects"
bind M run "~/.config/scripts/tmux-session-dispensary.sh ~/Movies/good-videos"

bind x kill-window
bind G run "~/.config/scripts/open-github.sh"
bind g neww -n "git" -S lazygit
bind y neww -n "yazi" -S yazi
bind n neww -n "news" -S newsboat
bind \\ last-window
bind | switch-client -l

bind v copy-mode # hardly ever use this
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection

bind o source-file $HOME/.config/tmux/tmux.conf \; display-message "Config reloaded!"
