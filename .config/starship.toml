add_newline = false
format = "${custom.path}$fill${custom.py_icon} ${custom.git_icon}\n$character"

[custom.path]
command = '''
. "$HOME/.config/themes/colors.sh"
hex_to_rgb() {
  hex="${1#\#}"
  printf '%d;%d;%d' "0x$(printf '%s' "$hex" | cut -c1-2)" "0x$(printf '%s' "$hex" | cut -c3-4)" "0x$(printf '%s' "$hex" | cut -c5-6)"
}
gray3="$(hex_to_rgb "$comment")"
gray4="$(hex_to_rgb "$border")"
home="${HOME%/}"
pwd="${PWD%/}"
if [ "$pwd" = "$home" ]; then
  display="~"
elif [ "${pwd#"$home"/}" != "$pwd" ]; then
  display="~/${pwd#"$home"/}"
else
  display="$pwd"
fi
parent="${display%/*}"
base="${display##*/}"
if [ "$display" = "/" ] || [ "$display" = "~" ] || [ "$parent" = "$display" ]; then
  printf '\033[3;38;2;%sm%s\033[0m' "$gray3" "$display"
else
  printf '\033[3;38;2;%sm%s/\033[3;38;2;%sm%s\033[0m' "$gray3" "$parent" "$gray4" "$base"
fi
'''
when = "true"
format = "$output"
unsafe_no_escape = true

[custom.git_icon]
command = '''
. "$HOME/.config/themes/colors.sh"
hex_to_rgb() {
  hex="${1#\#}"
  printf '%d;%d;%d' "0x$(printf '%s' "$hex" | cut -c1-2)" "0x$(printf '%s' "$hex" | cut -c3-4)" "0x$(printf '%s' "$hex" | cut -c5-6)"
}
yellow="$(hex_to_rgb "$border")"
gray3="$(hex_to_rgb "$orange")"
git rev-parse --is-inside-work-tree >/dev/null 2>&1 || {
  printf '   '
  exit 0
}
branch=$(git branch --show-current 2>/dev/null)
gst="$(git status --porcelain=2 --branch 2>/dev/null)"
if printf '%s\n' "$gst" | grep -Eq '^(1|2|u|\?) '; then
  printf '\033[38;2;%sm   \033[38;2;%sm%s\033[0m' "$gray3" "$yellow" "$branch"
  exit 0
fi
if printf '%s\n' "$gst" | grep -Eq '^# branch\.ab \+[1-9][0-9]* -[0-9]+|^# branch\.ab \+[0-9]+ -[1-9][0-9]*'; then
  printf '\033[38;2;%sm   \033[38;2;%sm%s\033[0m' "$gray3" "$yellow" "$branch"
  exit 0
fi
printf '\033[38;2;%sm \033[38;2;%sm%s\033[0m' "$gray3" "$gray3" "$branch"
'''
when = "true"
format = "$output"
unsafe_no_escape = true

[character]
success_symbol = '[\$](bold blue)'
error_symbol = '[\$](bold blue)'
vicmd_symbol = '[V](bold yellow)'

[fill]
symbol = ' '

[custom.py_icon]
command = '''
. "$HOME/.config/themes/colors.sh"
hex_to_rgb() {
  hex="${1#\#}"
  printf '%d;%d;%d' "0x$(printf '%s' "$hex" | cut -c1-2)" "0x$(printf '%s' "$hex" | cut -c3-4)" "0x$(printf '%s' "$hex" | cut -c5-6)"
}
active="$(hex_to_rgb "$const")"
inactive="$(hex_to_rgb "$dim")"
dir="$PWD"
venv=""
while :; do
  if [ -d "$dir.venv" ]; then
    venv="$dir.venv"
    break
  fi
  if [ -d "$dir/.venv" ]; then
    venv="$dir/.venv"
    break
  fi
  [ "$dir" = "/" ] && break
  dir="${dir%/*}"
  [ -z "$dir" ] && dir="/"
done
if [ -z "$venv" ]; then
  printf '   '
  exit 0
fi
if [ -n "$VIRTUAL_ENV" ] && [ "$VIRTUAL_ENV" = "$venv" ]; then
  printf '\033[38;2;%sm  \033[0m' "$active"
else
  printf '\033[38;2;%sm  \033[0m' "$inactive"
fi
'''
when = "true"
format = "$output"
unsafe_no_escape = true
