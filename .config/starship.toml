add_newline = false
format = "${custom.path}$fill${custom.py_icon} $git_branch\n$character"

[custom.path]
command = '''
. "$HOME/.config/themes/colors.sh"
hex_to_rgb() {
  hex="${1#\#}"
  printf '%d;%d;%d' "0x$(printf '%s' "$hex" | cut -c1-2)" "0x$(printf '%s' "$hex" | cut -c3-4)" "0x$(printf '%s' "$hex" | cut -c5-6)"
}
gray3="$(hex_to_rgb "$comment")"
gray4="$(hex_to_rgb "$const")"
home="${HOME%/}"
pwd="${PWD%/}"
if [ "$pwd" = "$home" ]; then
  display="~"
elif [ "${pwd#"$home"/}" != "$pwd" ]; then
  display="~/${pwd#"$home"/}"
else
  display="$pwd"
fi
parent="${display%/*}"
base="${display##*/}"
if [ "$display" = "/" ] || [ "$display" = "~" ] || [ "$parent" = "$display" ]; then
  printf '\033[3;38;2;%sm%s\033[0m' "$gray3" "$display"
else
  printf '\033[3;38;2;%sm%s/\033[3;38;2;%sm%s\033[0m' "$gray3" "$parent" "$gray4" "$base"
fi
'''
when = "true"
format = "$output"
unsafe_no_escape = true

[git_branch]
style = "red"
symbol = '  '
format = "[$symbol$branch]($style) "

[character]
success_symbol = '[\$](bold blue)'
error_symbol = '[\$](bold blue)'
vicmd_symbol = '[V](bold white)'

[fill]
symbol = ' '

[custom.py_icon]
command = '''
. "$HOME/.config/themes/colors.sh"
hex_to_rgb() {
  hex="${1#\#}"
  printf '%d;%d;%d' "0x$(printf '%s' "$hex" | cut -c1-2)" "0x$(printf '%s' "$hex" | cut -c3-4)" "0x$(printf '%s' "$hex" | cut -c5-6)"
}
active="$(hex_to_rgb "$const")"
inactive="$(hex_to_rgb "$dim")"
dir="$PWD"
venv=""
while :; do
  if [ -d "$dir.venv" ]; then
    venv="$dir.venv"
    break
  fi
  if [ -d "$dir/.venv" ]; then
    venv="$dir/.venv"
    break
  fi
  [ "$dir" = "/" ] && break
  dir="${dir%/*}"
  [ -z "$dir" ] && dir="/"
done
if [ -z "$venv" ]; then
  printf '   '
  exit 0
fi
if [ -n "$VIRTUAL_ENV" ] && [ "$VIRTUAL_ENV" = "$venv" ]; then
  printf '\033[38;2;%sm  \033[0m' "$active"
else
  printf '\033[38;2;%sm  \033[0m' "$inactive"
fi
'''
when = "true"
format = "$output"
unsafe_no_escape = true
