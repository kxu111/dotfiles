# ──────────────────────────────
#   FONT
# ──────────────────────────────

font_family      Iosevka Nerd Font Mono
italic_font      Iosevka Nerd Font Mono Italic
bold_font        Iosevka Nerd Font Mono Bold
bold_italic_font Iosevka Nerd Font Mono Bold Italic
symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E00A,U+E0A0-U+E0A3,U+E0B0-U+E0C8,U+E0CA,U+E0CC-U+E0D2,U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E634,U+E700-U+E7C5,U+EA60-U+EBEB,U+F000-U+F2E0,U+F300-U+F32F,U+F400-U+F4A9,U+F500-U+FAFF,U+FB00-U+FDFF,U+FE00-U+FEFF,U+E0000-U+E0FFF,U+F0000-U+FFFFF,U+100000-U+10FFFF Iosevka Nerd Font Propo
font_size 18

adjust_column_width 1
disable_ligatures never

# ──────────────────────────────
#   WINDOW BEHAVIOR
# ──────────────────────────────

window_padding_width 0
enable_audio_bell no
remember_window_size no
placement_strategy center
hide_window_decorations yes
copy_on_select yes
mouse_hide_wait -1.0
confirm_os_window_close 0


# ──────────────────────────────
#   CURSOR TRAIL
# ──────────────────────────────
cursor_trail 1
cursor_trail_decay 0.01 0.2
cursor_trail_start_threshold 1

# ──────────────────────────────
#   PERFORMANCE
# ──────────────────────────────

repaint_delay 10
input_delay   1
sync_to_monitor yes

# ──────────────────────────────
#   SCROLLBACK
# ──────────────────────────────

scrollback_lines 5000
scrollback_pager_history_size 64

# ──────────────────────────────
#   COLORS — Koda Palette Dark Monochrome
# ──────────────────────────────

foreground            #a6a6a6
background            #000000

selection_foreground  #c4c4c4
selection_background  #1a1a1a

cursor                #ffffff
cursor_text_color     #080808

url_color             #8a8a8a
active_border_color   #1a1a1a
inactive_border_color #121212

# ───────── ANSI

# black / base
color0   #000000
color8   #3d3d3d

# red / danger
color1   #4a4a4a
color9   #686868

# green
color2   #5c5c5c
color10  #a6a6a6

# yellow / warning
color3   #666666
color11  #b0b0b0

# blue / highlight
color4   #707070
color12  #b8b8b8

# magenta / pink
color5   #7a7a7a
color13  #d0d0d0

# cyan
color6   #848484
color14  #c0c0c0

# white / fg
color7   #a6a6a6
color15  #e0e0e0

window_border_width 0
cursor_shape block
cursor_blink_interval 0.8
shell_integration enabled

# ──────────────────────────────
#   KEYBINDINGS
# ──────────────────────────────

map super+t send_text all \x02t

map super+1 send_text all \x02\x31
map super+2 send_text all \x02\x32
map super+3 send_text all \x02\x33
map super+4 send_text all \x02\x34
map super+5 send_text all \x02\x35
map super+6 send_text all \x02\x36
map super+7 send_text all \x02\x37
map super+8 send_text all \x02\x38
map super+9 send_text all \x02\x39

map super+c send_text all \x02c
map super+d send_text all \x02x
map super+s send_text all \x02s
map super+i send_text all \x02i
map super+o send_text all \x02o
map super+h send_text all \x02h
map super+l send_text all \x02l
map super+j send_text all \x02j

map super+f send_text all \x02f
map super+shift+h send_text all \x02H
map super+shift+d send_text all \x02D
map super+shift+c send_text all \x02C
map super+shift+n send_text all \x02N
map super+shift+p send_text all \x02P
map super+shift+m send_text all \x02M
map super+shift+s send_text all \x02S
map super+shift+l send_text all \x02L

map super+p send_text all \x02p
map super+shift+w send_text all \x02W
map super+shift+g send_text all \x02G

map super+g send_text all \x02g
map super+y send_text all \x02y
map super+n send_text all \x02n

map super+shift+v send_text all \x02V

map super+r send_text all \x02r
